<!DOCTYPE html>
<html>
<head>
    <title>Country Explorer</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 1. Header Component Styling */
        .header {
            text-align: center;
            background-color: #2e86c1;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
        }

        /* 2. Search Component Styling */
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-container input {
            width: 60%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #aeb6bf;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #2e86c1;
        }

        .search-container button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #2e86c1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .search-container button:hover {
            background-color: #21618c;
        }

        /* 3. CountryList Component Styling (CSS Grid layout) */
        .country-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* 4. CountryCard Component Styling */
        .country-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .country-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .country-card img {
            width: 100%;
            height: 160px;
            object-fit: contain; /* ensures flag proportions remain intact */
            margin: 0 auto 15px;
            border-radius: 4px;
            border: 1px solid #eee;
            background-color: #fafafa;
        }

        .country-card h3 {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: #2c3e50;
            line-height: 1.3;
        }

        .country-card p {
            margin: 6px 0;
            font-size: 15px;
            color: #5d6d7e;
        }

        .country-card strong {
            color: #2c3e50;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            margin-top: 40px;
            font-weight: bold;
            color: #5d6d7e;
        }

        .error-message {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // 5. UTILITY MODULE
        // Manage API calls and format the country data
        // ==========================================
        const CountryAPI = {
            searchCountries: async (query) => {
                try {
                    // Fetch data from the public REST Countries API
                    const response = await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(query)}`);
                    
                    if (!response.ok) {
                        // The API returns 404 naturally when no matches are found
                        if (response.status === 404) {
                            return []; 
                        }
                        throw new Error('Failed to fetch data from REST Countries API');
                    }
                    
                    const data = await response.json();

                    // Format and map the raw JSON data to exactly match the App's required parameters
                    return data.map((country, index) => {
                        return {
                            id: country.cca3 || index, // Safely assigning a unique list key
                            name: country.name.common || 'Unknown',
                            capital: country.capital ? country.capital[0] : 'N/A',
                            population: country.population ? country.population.toLocaleString() : 'Unknown', // toLocaleString dynamically adds commas!
                            region: country.region || 'Unknown Region',
                            flag: country.flags ? country.flags.png : 'https://via.placeholder.com/150x100?text=No+Flag'
                        };
                    });
                } catch (error) {
                    throw error;
                }
            }
        };

        // ==========================================
        // REACT COMPONENTS
        // ==========================================

        // Header Component
        const Header = () => (
            <div className="header">
                <h1>🌍 Country Explorer</h1>
            </div>
        );

        // Search Component
        const Search = ({ onSearch }) => {
            const [query, setQuery] = useState('');

            const handleSearchSubmit = () => {
                if (query.trim() !== '') {
                    onSearch(query.trim());
                }
            };

            const handleKeyPress = (e) => {
                // Allows users to trigger search efficiently by hitting the Enter key
                if (e.key === 'Enter') handleSearchSubmit();
            };

            return (
                <div className="search-container">
                    <input 
                        type="text" 
                        placeholder="Search for a country (e.g., Japan, Brazil, India)..." 
                        value={query}
                        onChange={(e) => setQuery(e.target.value)}
                        onKeyPress={handleKeyPress}
                    />
                    <button onClick={handleSearchSubmit}>Search</button>
                </div>
            );
        };

        // CountryCard Component
        // Uses React Props to extract and render the exact details needed iteratively
        const CountryCard = ({ country }) => {
            return (
                <div className="country-card">
                    <img src={country.flag} alt={`Flag of ${country.name}`} />
                    <div>
                        <h3>{country.name}</h3>
                        <p><strong>Capital:</strong> {country.capital}</p>
                        <p><strong>Population:</strong> {country.population}</p>
                        <p><strong>Region/Continent:</strong> {country.region}</p>
                    </div>
                </div>
            );
        };

        // CountryList Component
        // Maps through the formatted array returned from the API Utility Module
        const CountryList = ({ countries }) => {
            if (countries.length === 0) return null;

            return (
                <div className="country-list">
                    {countries.map(country => (
                        <CountryCard key={country.id} country={country} />
                    ))}
                </div>
            );
        };

        // Main Application Engine
        const App = () => {
            // State handlers for results, errors, and loading animations
            const [countries, setCountries] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [hasSearched, setHasSearched] = useState(false);

            const performSearch = async (query) => {
                setLoading(true);
                setError(null);
                setHasSearched(true);
                setCountries([]);

                try {
                    // Await the asynchronous Utility Module payload mapping
                    const results = await CountryAPI.searchCountries(query);
                    setCountries(results);
                } catch (err) {
                    setError('An error occurred while fetching country data. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app-container">
                    {/* Component Rendering */}
                    <Header />
                    <Search onSearch={performSearch} />
                    
                    {/* Status Modifiers */}
                    {loading && <div className="status-message">Exploring the world... ✈️</div>}
                    
                    {error && <div className="status-message error-message">{error}</div>}
                    
                    {!loading && !error && hasSearched && countries.length === 0 && (
                        <div className="status-message">No countries found for that search! Try another name.</div>
                    )}

                    <CountryList countries={countries} />
                </div>
            );
        };

        // Initialization
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
