<!DOCTYPE html>
<html>
<head>
    <title>Centered Table Example</title>
</head>
<body>
    <p>Navya Ghatta 24bds0262</p>
    <h1 style="text-align:center">Centered Table Example</h1>

    <table border="1" align="center">
        <tr style="background-color: lightgreen; font-weight: bold;">
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>20</td>
            <td>Computer Science</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>22</td>
            <td>Information Technology</td>
        </tr>
    </table>

</body>
</html>
