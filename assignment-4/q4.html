<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            padding: 20px;
        }

        .calculator-container {
            background-color: white;
            padding: 24px;
            border-radius: 8px;
            max-width: 350px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
            border: 1px solid #e1e4e8;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .calc-button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .calc-button:hover {
            background-color: #218838;
        }

        .result-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .result-box h3 {
            margin: 0;
            color: #0056b3;
        }
    </style>
</head>
<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // React functional component
        const GradeCalculator = () => {
            // Multiple useState Hooks
            const [mark1, setMark1] = useState('');
            const [mark2, setMark2] = useState('');
            const [mark3, setMark3] = useState('');
            const [result, setResult] = useState(null);

            // Event handling (onChange)
            const handleMark1Change = (e) => setMark1(e.target.value);
            const handleMark2Change = (e) => setMark2(e.target.value);
            const handleMark3Change = (e) => setMark3(e.target.value);

            // Event handling (onClick)
            const handleCalculate = () => {
                // Type conversion using Number()
                const m1 = Number(mark1);
                const m2 = Number(mark2);
                const m3 = Number(mark3);

                // Arithmetic operations and average calculation
                const average = (m1 + m2 + m3) / 3;

                let finalGrade = '';

                // Conditional rendering logic (if-else if-else) and Comparison operators (>=)
                if (average >= 90) {
                    finalGrade = 'A';
                } else if (average >= 80) {
                    finalGrade = 'B';
                } else if (average >= 70) {
                    finalGrade = 'C';
                } else if (average >= 60) {
                    finalGrade = 'D';
                } else {
                    finalGrade = 'F';
                }

                // Save calculation result to state
                setResult({
                    avg: average.toFixed(2),
                    grade: finalGrade
                });
            };

            return (
                <div className="calculator-container">
                    <h2>Grade Calculator</h2>

                    {/* Controlled components linked to state */}
                    <div className="input-group">
                        <label>Subject 1 Marks:</label>
                        <input 
                            type="number" 
                            value={mark1} 
                            onChange={handleMark1Change} 
                            placeholder="e.g., 85" 
                        />
                    </div>
                    
                    <div className="input-group">
                        <label>Subject 2 Marks:</label>
                        <input 
                            type="number" 
                            value={mark2} 
                            onChange={handleMark2Change} 
                            placeholder="e.g., 90" 
                        />
                    </div>

                    <div className="input-group">
                        <label>Subject 3 Marks:</label>
                        <input 
                            type="number" 
                            value={mark3} 
                            onChange={handleMark3Change} 
                            placeholder="e.g., 78" 
                        />
                    </div>

                    <button className="calc-button" onClick={handleCalculate}>
                        Calculate Grade
                    </button>

                    {/* Result rendering based on state */}
                    {result !== null && (
                        <div className="result-box">
                            <p><strong>Average:</strong> {result.avg}</p>
                            <h3>Grade: {result.grade}</h3>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GradeCalculator />);
    </script>
</body>
</html>
