<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q16 - Overlapping Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .gallery-container {
            position: relative;
            width: 600px;
            height: 500px;
            margin-top: 30px;
            border: 2px dashed #999;
            background-color: #f9f9f9;
        }

        .gallery-image {
            /* position: absolute requirement to allow overlapping */
            position: absolute;
            width: 250px;
            height: 250px;
            cursor: pointer;
            border: 5px solid white;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .gallery-image:hover {
            transform: scale(1.05);
            /* Slight pop effect on hover */
        }

        /* Initial positions and z-index mapping */
        #img1 {
            top: 30px;
            left: 30px;
            z-index: 1;
            background-color: #ffcccc;
        }

        #img2 {
            top: 90px;
            left: 130px;
            z-index: 2;
            background-color: #ccffcc;
        }

        #img3 {
            top: 150px;
            left: 230px;
            z-index: 3;
            background-color: #ccccff;
        }
    </style>
</head>

<body>
    <p>Navya Ghatta 24bds0262</p>
    <h2>Overlapping Image Gallery</h2>
    <p>Click on any overlapping "image" placeholder to securely bring it to the very front using z-index manipulations!
    </p>

    <div class="gallery-container">
        <!-- We use styled div boxes posing as images to ensure they load offline -->
        <img src="https://via.placeholder.com/250/FF5733/FFFFFF?text=Image+1" id="img1" class="gallery-image"
            onclick="bringToFront(this)" alt="Image 1">
        <img src="https://via.placeholder.com/250/33FF57/FFFFFF?text=Image+2" id="img2" class="gallery-image"
            onclick="bringToFront(this)" alt="Image 2">
        <img src="https://via.placeholder.com/250/3357FF/FFFFFF?text=Image+3" id="img3" class="gallery-image"
            onclick="bringToFront(this)" alt="Image 3">
    </div>

    <script>
        // Global variable for tracking the top z-index value
        // Initializing it to 3 because our HTML already starts with elements layered up to 3
        var topZIndex = 3;

        function bringToFront(clickedImage) {
            // Using ++ increment operator in prefix mode (++topZIndex) guarantees
            // we first step up the count right away, and then assign that strictly higher value to the element's style property!
            clickedImage.style.zIndex = ++topZIndex;
        }
    </script>
</body>

</html>
