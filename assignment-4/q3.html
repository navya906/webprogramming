<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .gallery-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .main-image-container {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
            background-color: #ddd;
        }

        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            /* Smooth opacity transition for effect */
            transition: opacity 0.5s ease;
        }

        /* CSS Flexbox layout for thumbnails */
        .thumbnails-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 100px;
            height: 100px;
            cursor: pointer;
            border-radius: 4px;
            object-fit: cover;
            border: 3px solid transparent;
            
            /* CSS Transitions and transforms */
            transition: transform 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
            opacity: 0.7;
        }

        .thumbnail:hover {
            transform: scale(1.1); /* Transform scaling on hover */
            opacity: 1;
        }

        .thumbnail.active {
            border-color: #007bff;
            opacity: 1;
            transform: scale(1.05); /* Transform scaling for active state */
        }
    </style>
</head>
<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ImageGallery = () => {
            // Dynamic image objects
            const images = [
                { id: 1, url: 'https://picsum.photos/id/13/800/400', title: 'Landscape 1' },
                { id: 2, url: 'https://picsum.photos/id/15/800/400', title: 'Nature 2' },
                { id: 3, url: 'https://picsum.photos/id/29/800/400', title: 'Mountain 3' },
                { id: 4, url: 'https://picsum.photos/id/49/800/400', title: 'City beach 4' },
                { id: 5, url: 'https://picsum.photos/id/58/800/400', title: 'Lighthouse 5' }
            ];

            // useState Hook to track the active gallery image
            const [selectedImage, setSelectedImage] = useState(images[0]);

            return (
                <div className="gallery-container">
                    <h2>Interactive Image Gallery</h2>
                    
                    {/* Main Image View */}
                    <div className="main-image-container">
                        <img 
                            /* Dynamic image sources */
                            src={selectedImage.url} 
                            alt={selectedImage.title} 
                            className="main-image"
                        />
                    </div>

                    {/* Thumbnails flexbox list */}
                    <div className="thumbnails-container">
                        {/* Array map() method for rendering lists */}
                        {images.map((img) => (
                            <img 
                                /* key prop for list rendering optimization */
                                key={img.id}
                                /* Dynamic image sources */
                                src={img.url} 
                                alt={img.title} 
                                className={`thumbnail ${selectedImage.id === img.id ? 'active' : ''}`}
                                /* Event handling (onClick) */
                                onClick={() => setSelectedImage(img)}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ImageGallery />);
    </script>
</body>
</html>
