<!DOCTYPE html>
<html>
<head>
    <title>Todo List App</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
        }

        .todo-container {
            max-width: 400px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .input-group button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group button:hover {
            background-color: #0056b3;
        }

        .todo-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            background-color: #f8f9fa;
            padding: 12px 15px;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const TodoApp = () => {
            // Multiple useState Hooks (string and array)
            const [inputValue, setInputValue] = useState('');
            const [tasks, setTasks] = useState([]);

            // Event handler for input changes
            const handleInputChange = (e) => {
                setInputValue(e.target.value);
            };

            // Event handler for adding a task
            const handleAddTask = () => {
                if (inputValue.trim() !== '') {
                    // Using the spread operator for array immutability
                    const newTask = {
                        id: Date.now(), // Unique ID for list key
                        text: inputValue
                    };
                    
                    // State updates triggering re-renders
                    setTasks([...tasks, newTask]);
                    setInputValue(''); 
                }
            };

            return (
                <div className="todo-container">
                    <h2>Todo List</h2>
                    
                    <div className="input-group">
                        {/* Controlled component */}
                        <input 
                            type="text" 
                            value={inputValue} 
                            onChange={handleInputChange} 
                            placeholder="What needs to be done?" 
                        />
                        <button onClick={handleAddTask}>Add Task</button>
                    </div>

                    <ul className="todo-list">
                        {/* Array map() method for dynamic list rendering */}
                        {tasks.map((task) => (
                            /* List keys in React using task.id */
                            <li key={task.id} className="todo-item">
                                {task.text}
                            </li>
                        ))}
                    </ul>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TodoApp />);
    </script>
</body>
</html>
