<!DOCTYPE html>
<html>

<head>
    <title>React App - Calculator</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Minimal CSS showing box model, colors, and layout */
        .calculator-container {
            padding: 20px;
            /* Box Model */
            border: 2px solid #000;
            /* Box Model */
            margin: 10px 0;
            /* Box Model */
            background-color: #eee;
            /* Colors */
            color: #222;
            /* Colors */
            display: block;
            /* Layout */
            width: 300px;
            /* Layout */
        }
    </style>
</head>

<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        // Using object destructuring to get useState from the global React object
        const { useState } = React;

        // Functional Component as an Arrow Function
        const Calculator = () => {
            // useState Hooks for state management
            const [number1, setNumber1] = useState('');
            const [number2, setNumber2] = useState('');
            const [result, setResult] = useState(null);

            // Event handler for first input
            const handleNumber1Change = (e) => {
                setNumber1(e.target.value);
            };

            // Event handler for second input
            const handleNumber2Change = (e) => {
                setNumber2(e.target.value);
            };

            // Event handler for Addition
            const handleAdd = () => {
                // Type conversion using Number()
                const sum = Number(number1) + Number(number2);
                setResult(sum);
            };

            // Event handler for Subtraction
            const handleSubtract = () => {
                // Type conversion using Number()
                const diff = Number(number1) - Number(number2);
                setResult(diff);
            };

            // JSX syntax with className and controlled inputs
            return (
                <div className="calculator-container">
                    <h2>Basic Calculator</h2>

                    <div className="input-group">
                        <label>First Number:</label>
                        <input
                            type="number"
                            value={number1}
                            onChange={handleNumber1Change}
                            placeholder="Enter a number"
                        />
                    </div>

                    <div className="input-group">
                        <label>Second Number:</label>
                        <input
                            type="number"
                            value={number2}
                            onChange={handleNumber2Change}
                            placeholder="Enter a number"
                        />
                    </div>

                    <div className="button-group">
                        <button onClick={handleAdd}>Add (+)</button>
                        <button onClick={handleSubtract}>Subtract (-)</button>
                    </div>

                    {result !== null && (
                        <div className="result-box">
                            Result: {result}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Calculator />);
    </script>
</body>

</html>
