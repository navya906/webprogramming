<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q9 - Radio Button Selection</title>
</head>

<body>
    <p>Navya Ghatta 24bds0262</p>
    <h2>Select a Color</h2>

    <input type="radio" name="color" value="Red"> Red<br>
    <input type="radio" name="color" value="Green"> Green<br>
    <input type="radio" name="color" value="Blue"> Blue<br><br>

    <button onclick="showColor()">Show Selected Color</button>

    <div id="output"></div>

    <script>
        function showColor() {
            var colors = document.getElementsByName("color");
            var selectedColor = "";

            for (var i = 0; i < colors.length; i++) {
                if (colors[i].checked) {
                    selectedColor = colors[i].value;
                    break;
                }
            }

            if (selectedColor == "") {
                document.getElementById("output").innerHTML = "Please select a color!";
            } else {
                document.getElementById("output").innerHTML = "You selected: " + selectedColor;
            }
        }
    </script>

</body>

</html>
