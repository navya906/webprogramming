<!DOCTYPE html>
<html>
<head>
    <title>Book Explorer</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 1. Header Component Styling */
        .header {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
        }

        /* 2. Search Component Styling */
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-container input {
            width: 60%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #3498db;
        }

        .search-container button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .search-container button:hover {
            background-color: #2980b9;
        }

        /* 3. BookList Component Styling (CSS Grid) */
        .book-list {
            display: grid;
            /* Creates a responsive grid layout dynamically wrapping cards */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* 4. BookCard Component Styling */
        .book-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .book-card img {
            max-width: 140px;
            height: 200px;
            object-fit: cover;
            margin: 0 auto 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background-color: #e9ecef;
        }

        .book-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #2c3e50;
            line-height: 1.3;
        }

        .book-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #7f8c8d;
        }

        .book-card strong {
            color: #34495e;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            margin-top: 40px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .error-message {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <p1>Navya Ghatta 24bds0262</p1>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // UTILITY MODULE
        // Handle API requests & process book data
        // ==========================================
        const BookAPI = {
            searchBooks: async (query) => {
                try {
                    // Fetching data from public free Google Books API
                    const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=12`;
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        throw new Error('Failed to fetch books from Google Books API');
                    }
                    
                    const data = await response.json();
                    
                    if (!data.items) return [];

                    // Map the raw, messy Google data array into cleanly structured objects for our components
                    return data.items.map((item) => {
                        const info = item.volumeInfo;
                        return {
                            id: item.id,
                            title: info.title || 'Unknown Title',
                            authors: info.authors ? info.authors.join(', ') : 'Unknown Author',
                            // Fetch an appropriately sized thumbnail, or render a placeholder if the book is missing a cover
                            coverImage: info.imageLinks?.thumbnail || 'https://via.placeholder.com/150x200?text=No+Cover',
                            publisher: info.publisher || 'Unknown Publisher',
                            // Some dates from Google are formatted 'yyyy-mm-dd', we only need the 'yyyy' for presentation
                            publishedDate: info.publishedDate ? info.publishedDate.substring(0, 4) : 'Unknown Year'
                        };
                    });
                } catch (error) {
                    throw error;
                }
            }
        };

        // ==========================================
        // REACT COMPONENTS
        // ==========================================

        // 1. Header Component
        const Header = () => (
            <div className="header">
                <h1>📚 Book Explorer</h1>
            </div>
        );

        // 2. Search Component
        const Search = ({ onSearch }) => {
            const [query, setQuery] = useState('');

            const handleSearchSubmit = () => {
                if (query.trim() !== '') {
                    onSearch(query.trim());
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') handleSearchSubmit();
            };

            return (
                <div className="search-container">
                    <input 
                        type="text" 
                        placeholder="Search books by title, author, or keyword..." 
                        value={query}
                        onChange={(e) => setQuery(e.target.value)}
                        onKeyPress={handleKeyPress}
                    />
                    <button onClick={handleSearchSubmit}>Search</button>
                </div>
            );
        };

        // 3. BookCard Component
        // Receives an individual 'book' object as a Prop and renders the details
        const BookCard = ({ book }) => {
            return (
                <div className="book-card">
                    <img src={book.coverImage} alt={`Cover for ${book.title}`} />
                    <div>
                        <h3>{book.title}</h3>
                        <p><strong>Author:</strong> {book.authors}</p>
                        <p><strong>Publisher:</strong> {book.publisher}</p>
                        <p><strong>Year:</strong> {book.publishedDate}</p>
                    </div>
                </div>
            );
        };

        // 4. BookList Component
        // Receives an array of books as a Prop and renders a grid of BookCards
        const BookList = ({ books }) => {
            if (books.length === 0) return null;

            return (
                <div className="book-list">
                    {/* Render a dynamic list with map(), assigning the unique 'id' to the key prop */}
                    {books.map(book => (
                        <BookCard key={book.id} book={book} />
                    ))}
                </div>
            );
        };

        // Main App Component orchestrating the global state
        const App = () => {
            const [books, setBooks] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [hasSearched, setHasSearched] = useState(false);

            const performSearch = async (query) => {
                // Reset states indicating new API fetching cycle is starting
                setLoading(true);
                setError(null);
                setHasSearched(true);
                setBooks([]);

                try {
                    const results = await BookAPI.searchBooks(query);
                    setBooks(results);
                } catch (err) {
                    setError('An error occurred while fetching book data. Please try again later.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app-container">
                    {/* Render required sub-components */}
                    <Header />
                    <Search onSearch={performSearch} />
                    
                    {/* Conditional Rendering Handlers */}
                    {loading && <div className="status-message">Searching the library... ⏳</div>}
                    
                    {error && <div className="status-message error-message">{error}</div>}
                    
                    {!loading && !error && hasSearched && books.length === 0 && (
                        <div className="status-message">No books found for this search! Try another keyword.</div>
                    )}

                    <BookList books={books} />
                </div>
            );
        };

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
