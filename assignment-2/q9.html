<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Cascading Priority</title>
    <style>
        p {
            color: blue;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <p>Navya Ghatta 24bds0262</p>
    <p style="color: red; font-size: 22px;">Inline CSS takes precedence over internal CSS in case of conflicts.</p>
</body>

</html>
