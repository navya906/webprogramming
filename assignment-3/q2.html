<!DOCTYPE html>
<html lang="en">

<head>
    <p1>Navya Ghatta 24bds0262</p1>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer - Assignment 3</title>
    <style>
        :root {
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.5s ease;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-color: #f8fafc;
        }

        .controls {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #334155;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        /* Requirement: Button controls (type="button") */
        .btn {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            box-shadow: var(--shadow);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-red {
            background-color: #ef4444;
        }

        .btn-green {
            background-color: #22c55e;
        }

        .btn-blue {
            background-color: #3b82f6;
        }
    </style>
</head>

<body>

    <div class="controls">
        <h1>Pick a Color</h1>
        <div class="btn-group">
            <!-- Requirement: Event handlers (onclick) and Function with parameters -->
            <button type="button" class="btn btn-red" onclick="changeColor('#ef4444')">Red</button>
            <button type="button" class="btn btn-green" onclick="changeColor('#22c55e')">Green</button>
            <button type="button" class="btn btn-blue" onclick="changeColor('#3b82f6')">Blue</button>
        </div>
    </div>

    <script>
        /**
         * Requirement: Function with parameters
         * @param {string} colorCode - The hex or name of the color
         */
        function changeColor(colorCode) {
            // Requirement: document.body.style.backgroundColor
            document.body.style.backgroundColor = colorCode;
        }
    </script>

</body>

</html>
